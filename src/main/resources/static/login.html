<!DOCTYPE html>
<html>
<head>

<title>Login</title>
<link rel="stylesheet" href="style.css">

</head>

<body class="center">

<div class="glass login">

<h2>Login</h2>

<input id="username" placeholder="Username (min 5 chars)">
<input id="password" type="password" placeholder="Password (min 7 chars)">

<button onclick="login()">Login</button>

<p id="loginError"></p>

</div>

<script>

function login(){

let user=document.getElementById("username").value.trim()
let pass=document.getElementById("password").value.trim()

if(user=="" || pass==""){

document.getElementById("loginError").innerText="Please enter username and password"
return

}

if(user.length<5){

document.getElementById("loginError").innerText="Username must be at least 5 characters"
return

}

if(pass.length<7){

document.getElementById("loginError").innerText="Password must be at least 7 characters"
return

}

window.location="dashboard.html"

}

</script>

</body>
</html>
